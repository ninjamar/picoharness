# Optional services for LocalAI: Jina Reader and SearXNG
# These enable web search and webpage reading capabilities
# Run with: localai services up

services:
  jina-reader:
    image: ghcr.io/jina-ai/reader:latest
    container_name: jina-reader
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      PORT: 3000
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-4000}:${SEARXNG_PORT:-4000}"
    env_file: ./searxng/.env
    volumes:
      - ./searxng/core-config/:/etc/searxng/:Z
      - searxng-data:/var/cache/searxng/
    depends_on:
      - searxng-valkey

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data/

volumes:
  searxng-data:
  valkey-data:
